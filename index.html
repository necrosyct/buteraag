<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buteraag | Official Website</title>
    <style>
        /* Estilos Gerais / Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0b0e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animação de fundo sutil */
        .bg-glow {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Cabeçalho */
        header {
            padding: 30px 20px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 30px rgba(168, 85, 247, 0.3);
        }

        /* Conteúdo Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .release-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .release-container:hover {
            transform: translateY(-5px);
            border-color: rgba(168, 85, 247, 0.3);
        }

        .badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .artist-name {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Player do Spotify Embutido */
        .spotify-player {
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Botão de Link Direto */
        .btn-spotify {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #1DB954; /* Cor oficial do Spotify */
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.2);
        }

        .btn-spotify:hover {
            background-color: #1ed760;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
        }

        .btn-spotify svg {
            margin-right: 10px;
            fill: currentColor;
        }

        /* Rodapé / Contato */
        footer {
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        .contact-title {
            font-size: 0.9rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .contact-email {
            color: #a855f7;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .contact-email:hover {
            color: #c084fc;
            text-decoration: underline;
        }

        .copyright {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <!-- Cabeçalho -->

        <div class="logo">buteraag</div>

    </main>

</body>
</html>
